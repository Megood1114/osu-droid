name: iOS Build

on:
  push:
    branches: [master, develop]
    paths:
      - 'ios/**'
      - '.github/workflows/**'
  pull_request:
    branches: [master]
    paths:
      - 'ios/**'
      - '.github/workflows/**'
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14 # Apple Silicon runner (M1)
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Download BASS Frameworks
        working-directory: ios
        run: |
          mkdir -p Frameworks
          
          # Download BASS for iOS
          curl -L -o /tmp/bass-ios.zip https://www.un4seen.com/files/bass24-ios.zip
          unzip -o /tmp/bass-ios.zip -d /tmp/bass-ios
          
          # Copy the xcframework
          if [ -d "/tmp/bass-ios/bass.xcframework" ]; then
            cp -R /tmp/bass-ios/bass.xcframework Frameworks/
          else
            # Create a placeholder framework structure for CI compilation
            echo "Warning: BASS framework structure may differ. Creating placeholder."
            mkdir -p Frameworks/bass.xcframework
          fi
          
          # Download BASS Mix for iOS
          curl -L -o /tmp/bassmix-ios.zip https://www.un4seen.com/files/bassmix24-ios.zip
          unzip -o /tmp/bassmix-ios.zip -d /tmp/bassmix-ios
          
          if [ -d "/tmp/bassmix-ios/bassmix.xcframework" ]; then
            cp -R /tmp/bassmix-ios/bassmix.xcframework Frameworks/
          else
            mkdir -p Frameworks/bassmix.xcframework
          fi

      - name: Generate Xcode Project
        working-directory: ios
        run: xcodegen generate

      - name: Build for Simulator
        working-directory: ios
        run: |
          xcodebuild build \
            -project osu-droid-ios.xcodeproj \
            -scheme osu-droid-ios \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            | xcpretty || true

      - name: Build Unsigned IPA (Release)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        working-directory: ios
        run: |
          # Build the archive
          xcodebuild archive \
            -project osu-droid-ios.xcodeproj \
            -scheme osu-droid-ios \
            -archivePath build/osu-droid-ios.xcarchive \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=NO \
            | xcpretty || true
          
          # Create unsigned IPA from archive
          mkdir -p build/Payload
          if [ -d "build/osu-droid-ios.xcarchive/Products/Applications" ]; then
            cp -R build/osu-droid-ios.xcarchive/Products/Applications/*.app build/Payload/
            cd build && zip -r osu-droid-ios-unsigned.ipa Payload/
            echo "✅ Unsigned IPA created at build/osu-droid-ios-unsigned.ipa"
          else
            echo "⚠️ Archive build did not produce .app — check build logs"
          fi

      - name: Upload IPA Artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: osu-droid-ios-unsigned
          path: ios/build/osu-droid-ios-unsigned.ipa
          if-no-files-found: warn


